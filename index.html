<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vattam Chai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  text-align: center;

  /* Tea Shop Background */
  background: 
    linear-gradient(rgba(40,25,15,0.7), rgba(40,25,15,0.9)),
    url('https://images.unsplash.com/photo-1509042239860-f550ce710b93');
  background-size: cover;
  background-position: center;
}

/* Warm light overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, rgba(255,200,150,0.2), transparent);
  pointer-events: none;
}

/* Container */
.container {
  padding: 30px;
  animation: fadeIn 1.5s ease;
}

/* Heading */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  color: #ffe0b3;
  text-shadow: 0 0 10px rgba(255,200,150,0.5);
}

/* Video */
video {
  width: 260px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* Steam Effect */
.steam {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 120px;
}

.steam span {
  display: block;
  width: 8px;
  height: 40px;
  background: rgba(255,255,255,0.2);
  margin: 4px auto;
  border-radius: 50%;
  animation: steam 3s infinite ease-in-out;
}

.steam span:nth-child(2) { animation-delay: 0.5s; }
.steam span:nth-child(3) { animation-delay: 1s; }

@keyframes steam {
  0% { transform: translateY(0) scaleX(1); opacity: 0.3; }
  50% { transform: translateY(-40px) scaleX(1.5); opacity: 0.8; }
  100% { transform: translateY(-80px) scaleX(1); opacity: 0; }
}

/* Buttons */
.buttons { margin-top: 30px; }

button {
  padding: 15px 35px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 600;
}

.കുടിക്കാലോ {
  background: #c68642;
  color: white;
  box-shadow: 0 0 15px rgba(198,134,66,0.6);
}

.പിന്നീടാകാം {
  background: #5c4033;
  color: white;
}

.join {
  background: #2b1d14;
  color: white;
}

button:hover {
  transform: scale(1.1);
  background: #e0a96d;
}

/* Logo */
.logo {
  width: 140px;
  margin: 20px auto;
  border-radius: 50%;
  background: white;
  padding: 10px;
}

/* Text */
.about-text {
  max-width: 600px;
  margin: 20px auto;
  color: #fff3e0;
}

/* Hide */
.hidden { display: none; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="container" id="page1">

  <!-- Steam -->
  <div class="steam">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <video autoplay loop muted playsinline>
    <source src="chai-animation.mp4" type="video/mp4">
  </video>

  <h1>ഒരു ചായ കുടിച്ചാലോ ? ☕</h1>

  <div class="buttons">
    <button class="കുടിക്കാലോ" onclick="sendResponse('yes')">കുടിക്കാലോ ☕</button>
    <button class="പിന്നീടാകാം" onclick="sendResponse('no')">പിന്നീടാകാം ❌</button>
  </div>

  <div id="msg"></div>
</div>

<div class="container hidden" id="page2">

  <img src="logo.png" class="logo">

  <h1>VATTAM (വട്ടം)</h1>

  <div class="about-text">
    VATTAM is a creative circle where people connect over chai, ideas, and conversations.
    A place where warmth, thoughts, and creativity flow together like a perfect cup of tea ☕
  </div>

  <button class="join" onclick="joinUs()">Join Us ☕</button>

</div>

<script>
function sendResponse(answer) {
  if (answer === "yes") {
    setTimeout(() => {
      document.getElementById("page1").classList.add("hidden");
      document.getElementById("page2").classList.remove("hidden");
    }, 500);
  } else {
    document.getElementById("msg").innerHTML = "ശരി... പിന്നെ ഒരുദിവസം 😄";
  }
}

function joinUs() {
  window.location.href = "https://www.instagram.com/va.tt.am?igsh=MWVqZ2JqZmVzbHN6Yw==";
}
</script>

</body>
</html>
